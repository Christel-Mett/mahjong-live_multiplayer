<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Passwort zurücksetzen - Mahjong-Treff</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .reset-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #1a1a1a;
            color: white;
            font-family: sans-serif;
        }
        .reset-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(210, 180, 140, 0.3);
            width: 300px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #d2b48c;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-box">
            <h2>Neues Passwort</h2>
            <p style="font-size: 0.8em; opacity: 0.7;">Gib dein neues Passwort ein.</p>
            <input type="password" id="newPass" placeholder="Neues Passwort">
            <input type="password" id="newPassConfirm" placeholder="Passwort wiederholen">
            <button onclick="submitNewPassword()">Speichern</button>
            <p id="msg" style="margin-top: 15px; font-size: 0.9em;"></p>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        function submitNewPassword() {
            const pass = document.getElementById('newPass').value;
            const passConf = document.getElementById('newPassConfirm').value;
            const msg = document.getElementById('msg');

            if (pass.length < 6) {
                msg.innerText = "Passwort muss mind. 6 Zeichen haben.";
                return;
            }
            if (pass !== passConf) {
                msg.innerText = "Passwörter nicht gleich!";
                return;
            }

            // Wir senden den Token und das neue Passwort an den Server
            socket.emit('reset_password_final', { token: token, newPassword: pass });
        }

        socket.on('reset_password_response', (data) => {
            if (data.success) {
                alert("Erfolg! Dein Passwort wurde geändert.");
                window.location.href = "/";
            } else {
                document.getElementById('msg').innerText = "Fehler: " + data.message;
            }
        });
    </script>
</body>
</html>
